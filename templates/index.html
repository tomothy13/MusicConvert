<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MusicConvert — Local UI</title>
  <style>
    :root{--bg:#0b1220;--card:#0f1724;--muted:#9ca3af;--accent:#60a5fa;--accent-2:#7c3aed}
    *{box-sizing:border-box}
    body{font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:#e6eef8; margin:18px}
    .container{max-width:980px;margin:0 auto}
    h1{font-size:20px;margin:0 0 8px}
    .card{background:var(--card);padding:16px;border-radius:10px;box-shadow:0 1px 2px rgba(16,24,40,0.04);margin-bottom:12px}
    .links-area{display:flex;flex-direction:column;gap:8px}
    .links-list{display:flex;flex-direction:column;gap:8px}
    .link-input{width:100%;padding:10px;border:1px solid #1f2937;border-radius:8px;background:transparent;color:inherit}
    .controls{display:flex;gap:8px}
    button{background:var(--accent);color:#0b1220;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
    button.ghost{background:transparent;color:var(--accent);border:1px solid rgba(255,255,255,0.04)}
    #status{white-space:pre-wrap;background:rgba(15,23,36,0.98);color:#e6eef8;padding:12px;border-radius:8px;height:220px;overflow:auto}
    /* overlay covering links area while job running */
    .overlay{position:absolute;inset:0;background:rgba(2,6,23,0.75);display:flex;flex-direction:column;gap:8px;padding:12px;border-radius:10px}
    .links-card-wrap{position:relative}
    .tabs{display:flex;gap:8px;margin-top:10px}
    .tab{padding:8px 12px;border-radius:8px;background:transparent;cursor:pointer}
    .tab.active{background:#eef2ff;color:var(--accent)}
    .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:12px}
    .item{display:flex;gap:8px;align-items:center;background:#fff;padding:8px;border-radius:8px}
    .cover{width:56px;height:56px;background:#f3f4f6;border-radius:6px;flex:0 0 56px;object-fit:cover}
    .meta{flex:1}
    .meta h4{margin:0;font-size:14px}
    .meta p{margin:2px 0 0;color:var(--muted);font-size:13px}
    .small{font-size:12px;color:var(--muted)}
    .search-row{display:flex;gap:8px;align-items:center}
    .search-row input, .search-row select{padding:8px;border-radius:8px;border:1px solid #e5e7eb}
  </style>
</head>
<body>
  <div class="container">
    <h1>MusicConvert — Local UI</h1>

    <div class="card links-card-wrap">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div><strong>M4A Converter</strong><div class="small">Add many links and click Convert</div></div>
        </div>

        <div class="links-area">
          <div class="links-list" id="linksList">
            <input class="link-input link-box" placeholder="https://youtube.com/..." />
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-start;align-items:center;margin-top:6px">
            <button id="convertBtn">Convert</button>
            <button id="clearBtn" class="ghost">Clear</button>
            <button id="addLinkInline" class="ghost">Add link</button>
            <button id="removeLink" class="ghost">Remove</button>
          </div>
        </div>
      <div id="statusArea" style="margin-top:12px">
        <div id="status" style="display:none">Connecting...</div>
        <div id="downloadLink" style="margin-top:8px"></div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;flex-direction:column">
          <strong>Library</strong>
          <div class="small">Browse albums and songs stored on this host</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="search-row">
            <input id="search" placeholder="Search" />
            <select id="sortSelect"><option value="alpha">Alphabetical</option><option value="newest">Newest</option></select>
            <button id="refresh" class="ghost">Refresh</button>
          </div>
        </div>
      </div>

      <div class="tabs" style="margin-top:10px">
        <div class="tab active" data-tab="albums">Albums</div>
        <div class="tab" data-tab="songs">Songs</div>
      </div>

      <div id="gridArea">
        <div id="albumsView" class="list"></div>
        <div id="songsView" class="list" style="display:none"></div>
      </div>
    </div>
  </div>

<script>
// Link box management
const linksList = document.getElementById('linksList');
document.getElementById('addLink').addEventListener('click', addLinkBox);
document.getElementById('addLinkInline').addEventListener('click', addLinkBox);
document.getElementById('removeLink').addEventListener('click', ()=>{ const boxes = document.querySelectorAll('.link-box'); if(boxes.length>1) boxes[boxes.length-1].remove(); });
document.getElementById('clearBtn').addEventListener('click', ()=>{
  document.querySelectorAll('.link-box').forEach((b,i)=>{ if(i>0) b.remove(); else b.value=''; });
});

function addLinkBox(){ const inp=document.createElement('input'); inp.className='link-input link-box'; inp.placeholder='https://youtube.com/...'; inp.addEventListener('input', validateAllLinks); linksList.appendChild(inp); inp.focus(); }

// Validation: require a YouTube playlist/album link (contains list=) and youtube host
function isYouTubeAlbumLink(v){ if(!v) return true; try{ const u=new URL(v); const h=u.hostname.toLowerCase(); if(!(h.includes('youtube.com')||h.includes('youtu.be'))) return false; // require playlist/list param for album
  if(u.searchParams && u.searchParams.get('list')) return true; // typical playlist URL
  // youtu.be short links are single videos, treat as invalid for album-only requirement
  return false; }catch(e){ return false; }}

function validateAllLinks(){ let anyInvalid=false; document.querySelectorAll('.link-box').forEach(inp=>{ const ok=isYouTubeAlbumLink(inp.value.trim()); if(!ok){ inp.style.border='2px solid #ef4444'; inp.dataset.invalid='1'; anyInvalid=true; } else { inp.style.border='1px solid #e5e7eb'; delete inp.dataset.invalid; } }); document.getElementById('convertBtn').disabled = anyInvalid; return !anyInvalid; }

// attach early validators
document.querySelectorAll('.link-box').forEach(i=>i.addEventListener('input', validateAllLinks));

// Convert button: gather links and post to /enqueue
const convertBtn = document.getElementById('convertBtn');
const status = document.getElementById('status');
const statusArea = document.getElementById('statusArea');
const downloadLink = document.getElementById('downloadLink');
let jobRunning = false;
convertBtn.addEventListener('click', async ()=>{
  const vals = Array.from(document.querySelectorAll('.link-box')).map(i=>i.value.trim()).filter(Boolean);
  if(!vals.length) return alert('Add at least one link');
  if(!validateAllLinks()) return alert('One or more links are invalid');
  // submit as newline separated
  const payload = new FormData(); payload.append('links', vals.join('\n'));
  const res = await fetch('/enqueue', {method:'POST', body: payload});
  const json = await res.json();
  if(!json.job_id) return alert('Failed to start job');
  const jid = json.job_id;
  jobRunning = true;
  // show status box
  status.style.display='block'; status.textContent = '';
  downloadLink.innerHTML='';
  const ws = new WebSocket((location.protocol==='https:'?'wss://':'ws://') + location.host + '/ws/' + jid);
  ws.onmessage = (ev)=>{
    const txt = ev.data;
    if(txt === 'ZIP_CREATED') append('ZIP created');
    else if(txt.startsWith('ZIP_READY:')){
      const name = txt.split(':',2)[1];
      downloadLink.innerHTML = `<a href="/download/${jid}">Download ${name}</a>`;
    } else if(txt === '__DONE__'){ append('Job complete'); ws.close(); }
    else append(txt);
  };
  ws.onerror = ()=> append('WebSocket error');
  function append(m){ status.textContent += m + '\n'; status.scrollTop = status.scrollHeight; }
  ws.addEventListener('close', ()=>{ jobRunning=false; fetchAlbums(); fetchSongs(); });
});

// Overlay handling: show overlay covering links area while jobRunning
function showOverlay(){ const wrap=document.querySelector('.links-card-wrap'); if(!wrap) return; let ov=wrap.querySelector('.overlay'); if(!ov){ ov=document.createElement('div'); ov.className='overlay'; ov.innerHTML = '<div style="flex:1;overflow:auto" id="overlayStatus"></div><div style="display:flex;gap:8px"><button id="dismissOverlay" class="ghost">Dismiss</button></div>'; wrap.appendChild(ov); document.getElementById('dismissOverlay').addEventListener('click', ()=>{ ov.remove(); }); } overlayStatus = document.getElementById('overlayStatus'); overlayStatus.textContent=''; overlayStatus.style.whiteSpace='pre-wrap'; overlayStatus.style.color='inherit'; overlayStatus.style.fontFamily='inherit'; overlayStatus.style.fontSize='13px'; overlayStatus.style.overflow='auto'; overlayStatus.style.flex='1'; wrap.querySelector('.links-area').style.visibility='hidden'; }
function hideOverlay(){ const wrap=document.querySelector('.links-card-wrap'); if(!wrap) return; const ov=wrap.querySelector('.overlay'); if(ov) ov.remove(); wrap.querySelector('.links-area').style.visibility='visible'; }

// When a job starts, show overlay; update overlay text from status messages
let overlayStatus=null;
const origAppend = function(m){ status.textContent += m + '\n'; status.scrollTop = status.scrollHeight; };

function append(m){ status.textContent += m + '\n'; status.scrollTop = status.scrollHeight; if(overlayStatus!==null) overlayStatus.textContent += m + '\n'; }

// override the WebSocket flow to show overlay on start and show dismiss when done
const origConvertHandler = convertBtn.onclick;
// wrap existing click handler by listening for jobRunning toggles
const observerInterval = setInterval(()=>{
  if(jobRunning){ if(!document.querySelector('.links-card-wrap').querySelector('.overlay')) showOverlay(); }
}, 200);

// Tabs + refresh
const tabs = document.querySelectorAll('.tab');
tabs.forEach(t=> t.addEventListener('click', ()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); const tab=t.getAttribute('data-tab'); document.getElementById('albumsView').style.display = tab==='albums'?'grid':'none'; document.getElementById('songsView').style.display = tab==='songs'?'grid':'none'; }));

async function fetchAlbums(){
  const el = document.getElementById('albumsView'); el.innerHTML='Loading...';
  const res = await fetch('/api/albums'); const j = await res.json(); el.innerHTML=''; if(!j.albums || !j.albums.length) { el.textContent='No albums found'; return; }
  for(const a of j.albums.sort((x,y)=>x.name.localeCompare(y.name))){
    const item = document.createElement('div'); item.className='item';
    // try to pick cover from first song via API (best-effort)
    let cover = document.createElement('img'); cover.className='cover'; cover.src='';
    if(a.songs && a.songs.length){ /* nothing */ }
    const meta = document.createElement('div'); meta.className='meta'; meta.innerHTML = `<h4>${a.name}</h4><p class="small">Album</p>`;
    const actions = document.createElement('div'); actions.style.display='flex'; actions.style.gap='6px'; actions.innerHTML = `<a href="/download/album/${a.id}" class="small">Download</a>`;
    item.appendChild(cover); item.appendChild(meta); item.appendChild(actions);
    el.appendChild(item);
    // try to fetch cover art by asking for the first song in album details
    (async ()=>{
      try{
        const detal = await (await fetch('/api/albums/' + a.id)).json();
        if(detal.songs && detal.songs.length){
          const sid = detal.songs[0].id;
          const c = await fetch('/api/cover/' + sid);
          if(c.status===200){ cover.src = '/api/cover/' + sid; }
        }
      }catch(e){}
    })();
  }
}

async function fetchSongs(){
  const el = document.getElementById('songsView'); el.innerHTML='Loading...'; const res = await fetch('/api/songs'); const j = await res.json(); el.innerHTML=''; if(!j.songs || !j.songs.length){ el.textContent='No songs found'; return; }
  for(const s of j.songs){
    const item = document.createElement('div'); item.className='item';
    const cover = document.createElement('img'); cover.className='cover'; cover.src = '/api/cover/' + s.id;
    const meta = document.createElement('div'); meta.className='meta'; meta.innerHTML = `<h4>${s.title || s.filename}</h4><p class="small">${s.artist || ''} — ${s.album_name || ''}</p>`;
    const actions = document.createElement('div'); actions.style.display='flex'; actions.style.gap='6px'; actions.innerHTML = `<a href="/download/song/${s.id}" class="small">Download</a>`;
    item.appendChild(cover); item.appendChild(meta); item.appendChild(actions);
    el.appendChild(item);
  }
}

document.getElementById('refresh').addEventListener('click', ()=>{ fetchAlbums(); fetchSongs(); });
window.addEventListener('load', ()=>{ fetchAlbums(); fetchSongs(); });

// Auto-refresh every 30s unless a job is running
setInterval(()=>{ if(!jobRunning){ fetchAlbums(); fetchSongs(); } }, 30000);
</script>
</body>
</html>
